<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebGaze — Camera Permission</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117; color: #e2e8f0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 20px; text-align: center; padding: 40px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #334155; border-top-color: #6366f1;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1.3rem; font-weight: 600; }
    p  { color: #94a3b8; max-width: 360px; line-height: 1.6; font-size: 14px; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Allow Camera Access</h2>
  <p id="msg">WebGaze needs your camera for eye tracking.<br>
     Please click <strong>Allow</strong> in the browser prompt above.</p>
  <script src="grant-camera.js"></script>
</body>
</html>
